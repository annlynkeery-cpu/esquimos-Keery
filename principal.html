<script>
        // Cambiar entre secciones del menú vertical
        function mostrarSeccion(idSeccion) {
            document.querySelectorAll('.seccion-tienda').forEach(sec => sec.classList.add('oculto'));
            document.getElementById('sec-' + idSeccion).classList.remove('oculto');
        }

        // Lógica del Carrito de Compras
        let carrito = [];
        let total = 0;

        function agregarAlCarrito(nombre, precio) {
            carrito.push({ nombre, precio });
            total += precio;
            actualizarInterfazCarrito();
        }

        function actualizarInterfazCarrito() {
            const lista = document.getElementById('lista-carrito');
            const totalTxt = document.getElementById('total-precio');
            const detallesInput = document.getElementById('pedido_detalles');
            
            if(carrito.length === 0) {
                lista.innerHTML = '<p class="carrito-vacio">El carrito está vacío.</p>';
            } else {
                lista.innerHTML = '';
                carrito.forEach((item) => {
                    lista.innerHTML += `<li>${item.nombre} - $${item.precio.toFixed(2)}</li>`;
                });
            }
            totalTxt.innerText = total.toFixed(2);
            detallesInput.value = JSON.stringify(carrito); 
        }

        // Coloca hoy por defecto en el input date
        document.getElementById('fecha').valueAsDate = new Date();

        // -------------------------------------------------------------
        // CONEXIÓN CON SUPABASE
        const SUPABASE_URL = "https://axjoybhstkcftpelkcqs.supabase.co"; 
        const SUPABASE_KEY = "TU_ANON_KEY_REAL_AQUI"; // <-- ASEGÚRATE DE PEGAR TU CLAVE REAL AQUÍ
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Envío del Formulario a la Base de Datos
        document.getElementById('form-pedido').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if(carrito.length === 0) {
                alert("Por favor, agrega productos al carrito antes de hacer el pedido.");
                return;
            }

            const datosPedido = {
                nombre: document.getElementById('nombre').value,
                fecha: document.getElementById('fecha').value,
                direccion: document.getElementById('direccion').value,
                forma_pago: document.getElementById('forma_pago').value,
                pedido: document.getElementById('pedido_detalles').value, 
                total: total
            };

            const { data, error } = await supabaseClient
                .from('pedidos') 
                .insert([datosPedido]);

            if (error) {
                console.error("Error:", error);
                alert("Hubo un error al guardar tu pedido en Supabase.");
            } else {
                alert("¡Pedido realizado con éxito! Guardado en la base de datos.");
                carrito = [];
                total = 0;
                actualizarInterfazCarrito();
                document.getElementById('form-pedido').reset();
                document.getElementById('fecha').valueAsDate = new Date();
            }
        });
    </script>
